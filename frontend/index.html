<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>핫Pick스탁 - 주식 뉴스 대시보드</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- 헤더 영역 -->
    <header class="header">
        <div class="header-container">
            <h1 class="site-title">핫Pick스탁</h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="/" class="active">홈</a></li>
                    <li><a href="/news">뉴스</a></li>
                    <li><a href="/stocks">종목 검색</a></li>
                    <li><a href="/favorites">내 관심종목</a></li>
                    <li><a href="/settings">설정</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <main class="main-content">
        <!-- 필터 영역 -->
        <section class="filter-section">
            <div class="filter-container">
                <div class="stock-filters">
                    <!-- 종목 필터 버튼들이 동적으로 추가될 영역 -->
                </div>
                <div class="sort-options">
                    <button class="sort-btn active" data-sort="latest">최신순</button>
                    <button class="sort-btn" data-sort="oldest">오래된순</button>
                </div>
            </div>
        </section>

        <!-- 뉴스 목록 영역 -->
        <section class="news-section">
            <div class="news-container">
                <!-- 뉴스 카드들이 동적으로 추가될 영역 -->
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
