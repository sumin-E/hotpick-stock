<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Hotpick Stock</title>
</head>
<body>
  <h1>Hotpick Stock 뉴스 대시보드</h1>
  <div id="news-list"></div>

  <script>
    fetch('/api/news')
      .then(res => res.json())
      .then(newsList => {
        const container = document.getElementById('news-list');
        newsList.forEach(news => {
          const div = document.createElement('div');
          div.innerHTML = `<h3>${news.title}</h3><p>${news.summary}</p><small>${news.date}</small>`;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
