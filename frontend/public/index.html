<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>핫Pick스탁 - 뉴스 대시보드</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/newsCard.css">

</head>
<body>
    <header class="header">
        <a href="#" class="logo">🔥 핫Pick스탁</a>
        <nav>
            <ul class="nav-menu">
                <li><a href="#" class="active">홈</a></li>
                <li><a href="#">뉴스</a></li>
                <li><a href="#">종목 검색</a></li>
                <li><a href="#">내 관심종목</a></li>
                <li><a href="#">설정</a></li>
            </ul>
            <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
        </nav>
    </header>
    
    <!-- 종목 필터 섹션 -->
    <div id="stock-filter" class="stock-filter" style="display: none;">
        <div class="filter-header">
            <h3 class="filter-title">🏢 종목별 필터</h3>
            <span id="filter-count" class="filter-count">0개 선택됨</span>
            <div class="filter-actions">
                <button id="toggle-all-btn" class="toggle-all-btn" onclick="toggleAllFilters()">전체 선택</button>
                <button id="clear-filters-btn" class="clear-filters-btn" onclick="clearAllFilters()" disabled>초기화</button>
            </div>
        </div>
        <div id="filter-buttons" class="filter-buttons">
            <!-- 동적으로 생성되는 필터 버튼들 -->
        </div>
        <div id="selected-filters" class="selected-filters" style="display: none;">
            <!-- 선택된 필터 태그들 -->
        </div>
    </div>

    <div class="view-toggle">
        <div class="toggle-group">
            <button class="grid-view active" onclick="toggleView('grid')">
                <span class="icon">⊞</span> 그리드
            </button>
            <button class="list-view" onclick="toggleView('list')">
                <span class="icon">☰</span> 리스트
            </button>
        </div>
        
        <div class="sort-group">
            <button class="sort-btn active" onclick="toggleSort('latest')">
                <span class="icon">🔄</span> 최신순
            </button>
            <button class="sort-btn" onclick="toggleSort('oldest')">
                <span class="icon">⏰</span> 오래된순
            </button>
        </div>
        
        <div class="bookmark-filter-group">
            <button class="bookmark-filter-btn" onclick="toggleBookmarkFilter()">
                <span class="icon">⭐</span> 즐겨찾기만
                <span id="bookmark-count" class="count">0</span>
            </button>
        </div>
    </div>
    
    <div id="loading" class="loading">
        📰 뉴스를 불러오는 중...
    </div>
    
    <div id="error" class="error" style="display: none;">
        ❌ 뉴스를 불러오는데 실패했습니다.
        <br><button onclick="loadNews()">다시 시도</button>
    </div>
    
    <div id="news-container" class="news-container" style="display: none;">
        <!-- 뉴스 카드들이 여기에 동적으로 생성됩니다 -->
    </div>

    <!-- 뉴스 상세 모달 -->
    <div id="newsModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-meta">
                    <span id="modalSource" class="modal-source"></span>
                    <span id="modalDate" class="modal-date"></span>
                </div>
                <div id="modalSummary" class="modal-summary"></div>
                <div class="modal-actions">
                    <a id="modalLink" href="#" target="_blank" class="view-original-btn">📰 원문 보기</a>
                    <button onclick="closeModal()" class="close-modal-btn">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let newsData = [];
        let currentSortOrder = 'latest'; // 기본값: 최신순
        let selectedStocks = new Set(); // 선택된 종목들
        let availableStocks = new Map(); // 사용 가능한 종목과 뉴스 개수
        let bookmarkedNews = new Set(); // 즐겨찾기한 뉴스들
        let showBookmarkedOnly = false; // 즐겨찾기만 보기 필터

        // 페이지 로드시 뉴스 불러오기
        document.addEventListener('DOMContentLoaded', function() {
            loadBookmarksFromStorage();
            loadNews();
        });

        // 뉴스 데이터 불러오기
        async function loadNews() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const container = document.getElementById('news-container');

            // 로딩 상태 표시
            loading.style.display = 'block';
            error.style.display = 'none';
            container.style.display = 'none';

            try {
                console.log('API 호출 시작...');
                const response = await fetch('/api/news');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                newsData = await response.json();
                console.log('받은 뉴스 데이터:', newsData);

                // 종목 필터 초기화
                initializeStockFilter();

                // 뉴스 렌더링
                renderNews();
                
                // 즐겨찾기 개수 업데이트
                updateBookmarkCount();

                // 성공시 UI 상태 변경
                loading.style.display = 'none';
                container.style.display = 'grid';

            } catch (err) {
                console.error('뉴스 로딩 실패:', err);
                
                // 에러시 UI 상태 변경
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        // 뉴스 카드 렌더링
        function renderNews() {
            const container = document.getElementById('news-container');
            
            if (!newsData || newsData.length === 0) {
                container.innerHTML = '<div class="loading">표시할 뉴스가 없습니다.</div>';
                return;
            }

            // 필터링된 뉴스 데이터 사용
            const filteredNews = getFilteredNews();
            
            if (filteredNews.length === 0) {
                container.innerHTML = '<div class="loading">선택한 종목에 대한 뉴스가 없습니다.</div>';
                return;
            }

            container.innerHTML = filteredNews.map(news => createNewsCard(news)).join('');
            attachEventListeners();
        }

        // 필터링 및 정렬된 뉴스 데이터 반환
        function getFilteredNews() {
            let filtered = [...newsData];
            
            // 즐겨찾기 필터링 적용
            if (showBookmarkedOnly) {
                filtered = filtered.filter(news => bookmarkedNews.has(news.id));
            }
            
            // 종목 필터링 적용
            if (selectedStocks.size > 0) {
                filtered = filtered.filter(news => {
                    if (!news.stocks || !Array.isArray(news.stocks)) return false;
                    return news.stocks.some(stock => selectedStocks.has(stock));
                });
            }
            
            // 정렬 적용
            const sorted = filtered.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                
                if (currentSortOrder === 'latest') {
                    return dateB - dateA; // 최신순: 큰 날짜부터
                } else {
                    return dateA - dateB; // 오래된순: 작은 날짜부터
                }
            });
            
            return sorted;
        }

        // 주요 키워드 강조 함수
        function highlightKeywords(text) {
            // 강조할 주요 키워드 목록
            const keywordsList = [
                // 금융/경제 키워드
                '금리', '인플레이션', '환율', '유가', '달러', '원화',
                // 방향성 키워드
                '상승', '하락', '급등', '급락', '하회', '상회', '증가', '감소',
                // 실적 관련
                '매출', '수익', '이익', '손실', '적자', '흑자', '실적', 
                // 시장 관련
                '코스피', '코스닥', '나스닥', 'S&P', '다우', '닛케이',
                // 산업 키워드
                '반도체', '바이오', '자동차', '배터리', '에너지', 'AI', '인공지능',
                // 기업 활동
                '투자', '인수', '합병', '상장', '거래', '계약', '파트너십'
            ];
            
            let highlightedText = text;
            
            keywordsList.forEach(keyword => {
                // 대소문자 구분없이 키워드 찾기
                const regex = new RegExp(`(${keyword})`, 'gi');
                highlightedText = highlightedText.replace(regex, '<span class="keyword-highlight">$1</span>');
            });
            
            return highlightedText;
        }

        // 개별 뉴스 카드 생성
        function createNewsCard(news) {
            const sentiment = getSentiment(news.title + ' ' + news.summary);
            const timeAgo = getTimeAgo(news.date);
            const priorityClass = news.priority ? `priority-${news.priority}` : '';
            const priorityBadge = getPriorityBadge(news.priority);
            
            // 제목과 요약에 키워드 강조 적용
            const highlightedTitle = highlightKeywords(news.title);
            const highlightedSummary = highlightKeywords(news.summary);

            // 즐겨찾기 상태 확인
            const isBookmarked = bookmarkedNews.has(news.id);
            const bookmarkClass = isBookmarked ? 'active' : '';
            const bookmarkTitle = isBookmarked ? '즐겨찾기 제거' : '즐겨찾기 추가';

            return `
                <article class="news-card ${sentiment} ${priorityClass}" data-news-id="${news.id}" onclick="openNews(${news.id})">
                    ${priorityBadge}
                    <button class="bookmark-btn ${bookmarkClass}" onclick="toggleBookmark(event, ${news.id})" title="${bookmarkTitle}">⭐</button>
                    
                    <div class="chart-section"></div>
                    
                    <div class="content-section">
                        <div class="category-tags">
                            <span class="category-tag primary">${news.source}</span>
                            ${sentiment === 'bullish' ? '<span class="category-tag">상승</span>' : ''}
                            ${sentiment === 'bearish' ? '<span class="category-tag">하락</span>' : ''}
                            ${sentiment === 'neutral' ? '<span class="category-tag">중립</span>' : ''}
                        </div>
                        
                        <h3 class="news-title">
                            ${highlightedTitle}
                        </h3>
                        
                        <p class="news-summary">
                            ${highlightedSummary}
                        </p>
                        
                        <div class="news-meta">
                            <span class="news-time">${timeAgo}</span>
                            <span class="news-source">${news.source}</span>
                        </div>
                    </div>
                </article>
            `;
        }

        // 간단한 감정 분석
        function getSentiment(text) {
            const bullishKeywords = ['상승', '상회', '증가', '성장', '호조', '개선', '회복', '신고가', '오름', '급등'];
            const bearishKeywords = ['하락', '하회', '감소', '부진', '위축', '우려', '손실', '신저가', '급락', '인상'];
            
            const lowerText = text.toLowerCase();
            
            const bullishCount = bullishKeywords.filter(keyword => lowerText.includes(keyword)).length;
            const bearishCount = bearishKeywords.filter(keyword => lowerText.includes(keyword)).length;

            if (bullishCount > bearishCount) return 'bullish';
            if (bearishCount > bullishCount) return 'bearish';
            return 'neutral';
        }

        // 상대 시간 계산
        function getTimeAgo(dateString) {
            const newsDate = new Date(dateString);
            const now = new Date();
            const diffMs = now - newsDate;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return '오늘';
            if (diffDays === 1) return '어제';
            if (diffDays < 7) return `${diffDays}일 전`;
            
            return dateString;
        }

        // 중요도 배지 생성
        function getPriorityBadge(priority) {
            if (!priority || priority === 'normal') {
                return '';
            }
            
            const priorityLabels = {
                urgent: '긴급',
                important: '주요'
            };
            
            const label = priorityLabels[priority] || '';
            
            return `<div class="priority-badge ${priority}">${label}</div>`;
        }

        // 이벤트 리스너 설정
        function attachEventListeners() {
            // 이미 onclick으로 처리하므로 추가 설정 불필요
        }

        // 로컬스토리지에서 즐겨찾기 데이터 로드
        function loadBookmarksFromStorage() {
            const stored = localStorage.getItem('hotpick-bookmarks');
            if (stored) {
                try {
                    const bookmarkIds = JSON.parse(stored);
                    bookmarkedNews = new Set(bookmarkIds);
                    console.log('즐겨찾기 로드됨:', bookmarkedNews);
                } catch (e) {
                    console.error('즐겨찾기 데이터 로드 실패:', e);
                    bookmarkedNews = new Set();
                }
            }
        }

        // 로컬스토리지에 즐겨찾기 데이터 저장
        function saveBookmarksToStorage() {
            const bookmarkIds = Array.from(bookmarkedNews);
            localStorage.setItem('hotpick-bookmarks', JSON.stringify(bookmarkIds));
            console.log('즐겨찾기 저장됨:', bookmarkIds);
        }

        // 즐겨찾기 토글
        function toggleBookmark(event, newsId) {
            console.log('toggleBookmark 호출됨:', newsId, event.target);
            event.preventDefault();
            event.stopPropagation(); // 카드 클릭 이벤트 방지
            
            const btn = event.target.closest('.bookmark-btn');
            if (!btn) {
                console.error('즐겨찾기 버튼을 찾을 수 없습니다');
                return;
            }
            
            // 즐겨찾기 상태 토글
            if (bookmarkedNews.has(newsId)) {
                bookmarkedNews.delete(newsId);
                btn.classList.remove('active');
                btn.title = '즐겨찾기 추가';
                console.log(`뉴스 ${newsId} 즐겨찾기 제거`);
            } else {
                bookmarkedNews.add(newsId);
                btn.classList.add('active');
                btn.title = '즐겨찾기 제거';
                console.log(`뉴스 ${newsId} 즐겨찾기 추가`);
            }
            
            // 로컬스토리지에 저장
            saveBookmarksToStorage();
            
            // 즐겨찾기 개수 업데이트
            updateBookmarkCount();
        }

        // 즐겨찾기 필터 토글
        function toggleBookmarkFilter() {
            showBookmarkedOnly = !showBookmarkedOnly;
            
            const btn = document.querySelector('.bookmark-filter-btn');
            if (showBookmarkedOnly) {
                btn.classList.add('active');
                btn.innerHTML = '<span class="icon">⭐</span> 전체 보기 <span id="bookmark-count" class="count">' + bookmarkedNews.size + '</span>';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<span class="icon">⭐</span> 즐겨찾기만 <span id="bookmark-count" class="count">' + bookmarkedNews.size + '</span>';
            }
            
            renderNews();
            console.log('즐겨찾기 필터 토글:', showBookmarkedOnly);
        }

        // 즐겨찾기 개수 업데이트
        function updateBookmarkCount() {
            const countElement = document.getElementById('bookmark-count');
            if (countElement) {
                countElement.textContent = bookmarkedNews.size;
            }
        }

        // 뉴스 상세 모달 열기
        function openNews(newsId) {
            const news = newsData.find(n => n.id === newsId);
            if (!news) {
                alert(`뉴스 ${newsId} 정보를 찾을 수 없습니다.`);
                return;
            }

            // 모달 내용 채우기 (키워드 강조 적용)
            document.getElementById('modalTitle').innerHTML = highlightKeywords(news.title);
            document.getElementById('modalSource').textContent = news.source;
            document.getElementById('modalDate').textContent = getTimeAgo(news.date);
            document.getElementById('modalSummary').innerHTML = highlightKeywords(news.summary);
            
            const modalLink = document.getElementById('modalLink');
            if (news.url) {
                modalLink.href = news.url;
                modalLink.style.display = 'inline-block';
            } else {
                modalLink.style.display = 'none';
            }

            // 모달 표시
            document.getElementById('newsModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // 스크롤 방지
            
            console.log(`뉴스 ${newsId} 상세 보기`);
            // TODO: 클릭 로그 서버에 전송
        }

        // 모달 닫기
        function closeModal(event) {
            if (event && event.target !== event.currentTarget) {
                return; // 자식 요소 클릭시 닫지 않음
            }
            
            document.getElementById('newsModal').style.display = 'none';
            document.body.style.overflow = 'auto'; // 스크롤 복원
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        function toggleView(view) {
            const container = document.getElementById('news-container');
            const gridBtn = document.querySelector('.grid-view');
            const listBtn = document.querySelector('.list-view');

            if (view === 'list') {
                container.classList.add('list-view');
                gridBtn.classList.remove('active');
                listBtn.classList.add('active');
            } else {
                container.classList.remove('list-view');
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
            }
        }

        // 정렬 토글 함수
        function toggleSort(sortOrder) {
            currentSortOrder = sortOrder;
            
            // 버튼 활성화 상태 변경
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.sort-btn').classList.add('active');
            
            // 뉴스 다시 렌더링
            renderNews();
            
            console.log(`정렬 방식 변경: ${sortOrder}`);
        }

        function toggleMobileMenu() {
            const navMenu = document.querySelector('.nav-menu');
            navMenu.classList.toggle('active');
        }

        // 종목 필터 초기화
        function initializeStockFilter() {
            availableStocks.clear();
            
            // 모든 뉴스에서 종목 추출 및 카운트
            newsData.forEach(news => {
                if (news.stocks && Array.isArray(news.stocks)) {
                    news.stocks.forEach(stock => {
                        const count = availableStocks.get(stock) || 0;
                        availableStocks.set(stock, count + 1);
                    });
                }
            });
            
            // 필터 버튼 생성
            createFilterButtons();
            
            // 필터 섹션 표시
            document.getElementById('stock-filter').style.display = 'block';
        }

        // 필터 버튼 생성
        function createFilterButtons() {
            const filterButtons = document.getElementById('filter-buttons');
            
            if (!filterButtons) {
                console.error('filter-buttons 요소를 찾을 수 없습니다.');
                return;
            }
            
            console.log('사용 가능한 종목들:', availableStocks);
            
            // 종목을 알파벳 순으로 정렬
            const sortedStocks = Array.from(availableStocks.entries())
                .sort(([a], [b]) => a.localeCompare(b, 'ko'));
            
            console.log('정렬된 종목들:', sortedStocks);
            
            filterButtons.innerHTML = sortedStocks
                .map(([stock, count]) => 
                    `<button class="filter-btn" data-stock="${stock}" onclick="toggleStockFilter('${stock}')">
                        ${stock}
                        <span class="count">${count}</span>
                    </button>`
                ).join('');
                
            console.log('필터 버튼 생성 완료, 생성된 개수:', sortedStocks.length);
        }

        // 종목 필터 토글
        function toggleStockFilter(stock) {
            if (selectedStocks.has(stock)) {
                selectedStocks.delete(stock);
            } else {
                selectedStocks.add(stock);
            }
            
            updateFilterButtons();
            updateSelectedFilters();
            updateFilterCount();
            renderNews();
        }

        // 필터 버튼 상태 업데이트
        function updateFilterButtons() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                const stock = btn.dataset.stock;
                if (selectedStocks.has(stock)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 선택된 필터 태그 업데이트
        function updateSelectedFilters() {
            const container = document.getElementById('selected-filters');
            
            if (selectedStocks.size === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'flex';
            container.innerHTML = Array.from(selectedStocks)
                .map(stock => 
                    `<div class="selected-filter-tag">
                        ${stock}
                        <span class="remove" onclick="toggleStockFilter('${stock}')">×</span>
                    </div>`
                ).join('');
        }

        // 필터 카운트 업데이트
        function updateFilterCount() {
            const countElement = document.getElementById('filter-count');
            const clearBtn = document.getElementById('clear-filters-btn');
            const toggleBtn = document.getElementById('toggle-all-btn');
            
            countElement.textContent = `${selectedStocks.size}개 선택됨`;
            clearBtn.disabled = selectedStocks.size === 0;
            
            if (selectedStocks.size === availableStocks.size) {
                toggleBtn.textContent = '전체 해제';
            } else {
                toggleBtn.textContent = '전체 선택';
            }
        }

        // 모든 필터 초기화
        function clearAllFilters() {
            selectedStocks.clear();
            updateFilterButtons();
            updateSelectedFilters();
            updateFilterCount();
            renderNews();
        }

        // 전체 선택/해제 토글
        function toggleAllFilters() {
            if (selectedStocks.size === availableStocks.size) {
                // 전체 해제
                clearAllFilters();
            } else {
                // 전체 선택
                availableStocks.forEach((count, stock) => {
                    selectedStocks.add(stock);
                });
                updateFilterButtons();
                updateSelectedFilters();
                updateFilterCount();
                renderNews();
            }
        }
    </script>
</body>
</html>
