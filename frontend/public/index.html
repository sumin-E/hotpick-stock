<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>핫Pick스탁 - 뉴스 대시보드</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/newsCard.css">

</head>
<body>
    <header class="header">
        <a href="#" class="logo">🔥 핫Pick스탁</a>
        <nav>
            <ul class="nav-menu">
                <li><a href="#" class="active">홈</a></li>
                <li><a href="#">뉴스</a></li>
                <li><a href="#">종목 검색</a></li>
                <li><a href="#">내 관심종목</a></li>
                <li><a href="#">설정</a></li>
            </ul>
            <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
        </nav>
    </header>
    
    <div class="view-toggle">
        <button class="grid-view active" onclick="toggleView('grid')">
            <span class="icon">⊞</span> 그리드
        </button>
        <button class="list-view" onclick="toggleView('list')">
            <span class="icon">☰</span> 리스트
        </button>
    </div>
    
    <div id="loading" class="loading">
        📰 뉴스를 불러오는 중...
    </div>
    
    <div id="error" class="error" style="display: none;">
        ❌ 뉴스를 불러오는데 실패했습니다.
        <br><button onclick="loadNews()">다시 시도</button>
    </div>
    
    <div id="news-container" class="news-container" style="display: none;">
        <!-- 뉴스 카드들이 여기에 동적으로 생성됩니다 -->
    </div>

    <script>
        let newsData = [];

        // 페이지 로드시 뉴스 불러오기
        document.addEventListener('DOMContentLoaded', loadNews);

        // 뉴스 데이터 불러오기
        async function loadNews() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const container = document.getElementById('news-container');

            // 로딩 상태 표시
            loading.style.display = 'block';
            error.style.display = 'none';
            container.style.display = 'none';

            try {
                console.log('API 호출 시작...');
                const response = await fetch('/api/news');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                newsData = await response.json();
                console.log('받은 뉴스 데이터:', newsData);

                // 뉴스 렌더링
                renderNews();

                // 성공시 UI 상태 변경
                loading.style.display = 'none';
                container.style.display = 'grid';

            } catch (err) {
                console.error('뉴스 로딩 실패:', err);
                
                // 에러시 UI 상태 변경
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        // 뉴스 카드 렌더링
        function renderNews() {
            const container = document.getElementById('news-container');
            
            if (!newsData || newsData.length === 0) {
                container.innerHTML = '<div class="loading">표시할 뉴스가 없습니다.</div>';
                return;
            }

            container.innerHTML = newsData.map(news => createNewsCard(news)).join('');
            attachEventListeners();
        }

        // 개별 뉴스 카드 생성
        function createNewsCard(news) {
            const sentiment = getSentiment(news.title + ' ' + news.summary);
            const timeAgo = getTimeAgo(news.date);

            return `
                <article class="news-card ${sentiment}" data-news-id="${news.id}" onclick="openNews(${news.id})">
                    <button class="bookmark-btn" onclick="toggleBookmark(event, ${news.id})" title="즐겨찾기">⭐</button>
                    
                    <div class="chart-section"></div>
                    
                    <div class="content-section">
                        <div class="category-tags">
                            <span class="category-tag primary">${news.source}</span>
                            ${sentiment === 'bullish' ? '<span class="category-tag">상승</span>' : ''}
                            ${sentiment === 'bearish' ? '<span class="category-tag">하락</span>' : ''}
                            ${sentiment === 'neutral' ? '<span class="category-tag">중립</span>' : ''}
                        </div>
                        
                        <h3 class="news-title">
                            ${news.title}
                        </h3>
                        
                        <p class="news-summary">
                            ${news.summary}
                        </p>
                        
                        <div class="news-meta">
                            <span class="news-time">${timeAgo}</span>
                            <span class="news-source">${news.source}</span>
                        </div>
                    </div>
                </article>
            `;
        }

        // 간단한 감정 분석
        function getSentiment(text) {
            const bullishKeywords = ['상승', '상회', '증가', '성장', '호조', '개선', '회복', '신고가', '오름', '급등'];
            const bearishKeywords = ['하락', '하회', '감소', '부진', '위축', '우려', '손실', '신저가', '급락', '인상'];
            
            const lowerText = text.toLowerCase();
            
            const bullishCount = bullishKeywords.filter(keyword => lowerText.includes(keyword)).length;
            const bearishCount = bearishKeywords.filter(keyword => lowerText.includes(keyword)).length;

            if (bullishCount > bearishCount) return 'bullish';
            if (bearishCount > bullishCount) return 'bearish';
            return 'neutral';
        }

        // 상대 시간 계산
        function getTimeAgo(dateString) {
            const newsDate = new Date(dateString);
            const now = new Date();
            const diffMs = now - newsDate;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return '오늘';
            if (diffDays === 1) return '어제';
            if (diffDays < 7) return `${diffDays}일 전`;
            
            return dateString;
        }

        // 이벤트 리스너 설정
        function attachEventListeners() {
            // 이미 onclick으로 처리하므로 추가 설정 불필요
        }

        // 즐겨찾기 토글
        function toggleBookmark(event, newsId) {
            event.stopPropagation(); // 카드 클릭 이벤트 방지
            
            const btn = event.target;
            btn.classList.toggle('active');
            
            console.log(`뉴스 ${newsId} 즐겨찾기 토글`);
            // TODO: 서버에 즐겨찾기 상태 전송
        }

        // 뉴스 상세 페이지 열기
        function openNews(newsId) {
            const news = newsData.find(n => n.id === newsId);
            if (news && news.url) {
                window.open(news.url, '_blank');
            } else {
                alert(`뉴스 ${newsId} 상세 정보를 준비 중입니다.`);
            }
            
            console.log(`뉴스 ${newsId} 클릭`);
            // TODO: 클릭 로그 서버에 전송
        }

        function toggleView(view) {
            const container = document.getElementById('news-container');
            const gridBtn = document.querySelector('.grid-view');
            const listBtn = document.querySelector('.list-view');

            if (view === 'list') {
                container.classList.add('list-view');
                gridBtn.classList.remove('active');
                listBtn.classList.add('active');
            } else {
                container.classList.remove('list-view');
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
            }
        }

        function toggleMobileMenu() {
            const navMenu = document.querySelector('.nav-menu');
            navMenu.classList.toggle('active');
        }
    </script>
</body>
</html>
